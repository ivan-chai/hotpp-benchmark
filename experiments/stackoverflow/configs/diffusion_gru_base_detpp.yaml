defaults:
  - default
  - _self_

name: diffusion_gru_detpp

diffusion_steps: 15

detection_k: 48

module:
  _target_: hotpp.modules.NextKModule
  seq_encoder:
    embedder:
      categorical_noise: 0.1
    rnn_partial:
      _target_: hotpp.nn.GRU
      _partial_: true
      hidden_size: ${rnn_hidden_size}
    max_inference_context: ${rnn_inference_context}
    inference_context_step: ${rnn_inference_context_step}
  head_partial: ${head}
  loss:
    _target_: hotpp.losses.HorizonDiffusionLoss
    k: ${next_k}
    diffusion_loss_weight: 1
    decoder_loss_weight: 1
    embedder_regularizer: 1
    alpha: 0.5
    detach_embeddings_from_step: 1
    detach_decoder: false
    padding_prob: 0.0
    next_item_loss:
      _target_: hotpp.losses.DetectionLoss
      loss_subset: 0.5
      prefetch_factor: 0.5
      match_weights:
        _presence: 4
        timestamps: 2
        labels: 1
      k: ${detection_k}
      horizon: ${metric.horizon}
      next_item_adapter:
        timestamps: mode
        labels: mean
      next_item_loss:
        _target_: hotpp.losses.NextItemLoss
        losses:
          _presence:
            _target_: hotpp.losses.BinaryCrossEntropyLoss
          timestamps:
            _target_: hotpp.losses.TimeMAELoss
            delta: start
            max_delta: ${max_duration}
            smoothing: ${time_smoothing}
          labels:
            _target_: hotpp.losses.CrossEntropyLoss
            num_classes: ${num_classes}
    embedder: ${module.seq_encoder.embedder}
    denoiser_partial:
      _target_: hotpp.nn.GRUDenoiser
      _partial_: true
      hidden_size: ${rnn_hidden_size}
      generation_steps: ${diffusion_steps}
      num_layers: 1
    decoder_partial:
      _target_: hotpp.nn.Head
      _partial_: true
      hidden_dims: []
    max_time_delta: ${max_time_delta}
    loss_step: 1
    generation_steps: ${diffusion_steps}
  max_predictions: ${max_predictions}
