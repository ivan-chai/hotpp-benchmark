defaults:
  - diffusion_gru_detpp_v48
  - _self_

name: diffusion_gru_detpp_v49

# V48 (long-range diffusion target) + per-slot learnable mask
# embedding (K, D). Tackles V48's 94% mask collapse by giving each
# absent slot its own reconstruction target.
module:
  loss:
    _target_: hotpp.losses.HorizonDiffusionLossV49
    diffusion_target_min_delta: 10.0
    diffusion_target_max_delta: 30.0
    mask_embedding_init_scale: 0.02
