defaults:
  - default
  - _self_

name: nhp_mamba_combo_structural_channel
transformer_hidden_size: 128
transformer_layers: 4
max_intensity: null

head:
  use_batch_norm: false
  hidden_dims: [64]

module:
  _target_: hotpp.modules.NextItemModule

  seq_encoder:
    _target_: hotpp.nn.Encoder
    model_partial:
      _target_: hotpp.nn.StructuralMambaTimeEmbedding
      _partial_: true

      hidden_size: ${transformer_hidden_size}
      num_layers: ${transformer_layers}
      d_state: 16
      d_conv: 4
      expand: 2
      time_mode: structural_channel
      pos_type: time-angular-rel
      max_duration: ${max_duration}
      vocab_size: ${num_classes}

    max_context: ${transformer_context}

  optimizer_partial:
    _partial_: true
    _target_: torch.optim.Adam
    lr: 0.001
    weight_decay: 0.0
  lr_scheduler_partial: null

  head_partial: ${head}

  loss:
    _target_: hotpp.losses.NHPLoss
    num_classes: ${num_classes}
    time_smoothing: ${time_smoothing}
    max_intensity: ${max_intensity}
    thinning_params: ${thinning_params}

  autoreg_max_steps: ${max_predictions}

trainer:
  precision: 32
